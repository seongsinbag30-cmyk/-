<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마음 상담 — 이단·사이비 피해 지원</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #111827;
    --surface:   #1C2333;
    --card:      #242f45;
    --card-hover:#2a3650;
    --accent:    #5b8fe0;
    --accent-soft:#3a5a9e;
    --selected:  #4a7acc;
    --sel-bg:    #1e3155;
    --border:    #2e3f5c;
    --border-sel:#5b8fe0;
    --text:      #dce6f5;
    --muted:     #7a90b0;
    --dim:       #4a6080;
    --crisis:    #c0392b;
    --crisis-bg: #2d1515;
    --send-disabled: #2a3650;
    --send-active: linear-gradient(135deg,#4a7acc,#5b8fe0);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 0;
  }

  /* ── LAYOUT ── */
  #app {
    width: 100%;
    max-width: 680px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .header-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--accent-soft);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .header-info h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
  .header-info p  { font-size: 12px; color: var(--muted); }
  .crisis-btn {
    margin-left: auto;
    font-size: 11px;
    color: #e07a7a;
    border: 1px solid #5a2020;
    background: var(--crisis-bg);
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .2s;
  }
  .crisis-btn:hover { opacity: .8; }

  /* ── CHAT AREA ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  /* ── MESSAGES ── */
  .msg { display: flex; flex-direction: column; gap: 6px; max-width: 100%; }
  .msg.user { align-items: flex-end; }
  .msg.bot  { align-items: flex-start; }

  .bubble {
    padding: 13px 17px;
    border-radius: var(--radius);
    max-width: 82%;
    font-size: 14.5px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: keep-all;
  }
  .msg.user .bubble {
    background: var(--accent-soft);
    color: #c8daf5;
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: var(--surface);
    color: var(--text);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }

  .msg-label {
    font-size: 11px;
    color: var(--dim);
    padding: 0 4px;
  }

  /* ── TYPING INDICATOR ── */
  .typing-dot {
    display: inline-flex; gap: 4px; align-items: center;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
  }
  .typing-dot span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
  }
  .typing-dot span:nth-child(2) { animation-delay: .2s; }
  .typing-dot span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity: .4; }
    40%         { transform: translateY(-6px); opacity: 1; }
  }

  /* ── CHOICE WIDGET ── */
  .choice-widget {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 16px 18px;
  }
  .q-eyebrow {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }
  .q-text {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.65;
    word-break: keep-all;
  }

  .opts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .opt {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 14px;
    display: flex;
    align-items: flex-start;
    gap: 11px;
    cursor: pointer;
    text-align: left;
    transition: background .18s, border-color .18s, transform .12s;
    color: var(--text);
    font-family: inherit;
  }
  .opt:hover {
    background: var(--card-hover);
    border-color: var(--dim);
    transform: translateY(-1px);
  }
  .opt.selected {
    background: var(--sel-bg);
    border-color: var(--border-sel);
    border-left-width: 3px;
  }
  .opt-full { grid-column: 1 / -1; }
  .opt-icon {
    font-size: 20px;
    margin-top: 1px;
    flex-shrink: 0;
    line-height: 1;
  }
  .opt-main { font-size: 13.5px; font-weight: 500; line-height: 1.4; }
  .opt-sub  { font-size: 11.5px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  .other-box {
    display: none;
    grid-column: 1 / -1;
  }
  .other-box.visible { display: block; }
  .other-box textarea {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    padding: 12px 14px;
    resize: vertical;
    min-height: 90px;
    outline: none;
    transition: border-color .2s;
    line-height: 1.6;
  }
  .other-box textarea:focus { border-color: var(--accent); }
  .other-box textarea::placeholder { color: var(--dim); }

  .send-btn {
    align-self: flex-end;
    padding: 11px 24px;
    border-radius: 10px;
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: opacity .2s, transform .12s;
    letter-spacing: -0.1px;
  }
  .send-btn.disabled {
    background: var(--send-disabled);
    color: var(--dim);
    cursor: not-allowed;
    opacity: .6;
  }
  .send-btn.active {
    background: var(--send-active);
    color: #fff;
    box-shadow: 0 4px 16px rgba(74,122,204,.35);
  }
  .send-btn.active:hover { opacity: .9; transform: translateY(-1px); }

  /* ── STEP WIDGETS ── */
  .step-widget {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .step-header {
    padding: 20px 22px 14px;
    border-bottom: 1px solid var(--border);
  }
  .step-eyebrow {
    font-size: 10px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 6px;
  }
  .step-title { font-size: 16px; font-weight: 600; word-break: keep-all; }
  .step-opts { padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .step-opt {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
    transition: background .15s, border-color .15s;
    font-family: inherit; color: var(--text); text-align: left;
  }
  .step-opt:hover { background: var(--card-hover); border-color: var(--dim); }
  .step-opt.selected { background: var(--sel-bg); border-color: var(--border-sel); }
  .step-opt-icon { font-size: 22px; flex-shrink: 0; }
  .step-opt-main { font-size: 14px; font-weight: 500; }
  .step-opt-sub  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .step-input { padding: 0 16px 16px; }
  .step-input textarea, .step-input input {
    width: 100%; background: var(--card);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text); font-family: inherit; font-size: 14px;
    padding: 12px 14px; outline: none;
    transition: border-color .2s;
  }
  .step-input textarea:focus, .step-input input:focus { border-color: var(--accent); }
  .step-input textarea::placeholder, .step-input input::placeholder { color: var(--dim); }
  .step-input textarea { resize: vertical; min-height: 70px; }
  .step-actions {
    padding: 0 16px 16px;
    display: flex; justify-content: flex-end;
  }

  /* ── INTRO ── */
  .intro-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    display: flex; flex-direction: column; align-items: center;
    text-align: center; gap: 16px;
  }
  .intro-icon { font-size: 40px; }
  .intro-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .intro-desc { font-size: 14px; color: var(--muted); line-height: 1.8; word-break: keep-all; }
  .intro-badge {
    background: #0f2a1a; border: 1px solid #1e4d2e;
    color: #6dcf9a; border-radius: 6px;
    font-size: 12px; padding: 6px 14px; font-weight: 500;
  }
  .intro-btn {
    background: var(--send-active);
    color: #fff; border: none; border-radius: 10px;
    font-family: inherit; font-size: 14.5px; font-weight: 600;
    padding: 13px 32px; cursor: pointer;
    transition: opacity .2s, transform .12s;
    box-shadow: 0 4px 20px rgba(74,122,204,.3);
    margin-top: 4px;
  }
  .intro-btn:hover { opacity: .9; transform: translateY(-1px); }

  /* ── SUMMARY CARD ── */
  .summary-card {
    background: var(--surface);
    border: 1px solid var(--accent-soft);
    border-radius: var(--radius); padding: 20px 22px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .summary-row { display: flex; align-items: flex-start; gap: 12px; }
  .summary-label { font-size: 12px; color: var(--muted); width: 80px; flex-shrink: 0; padding-top: 2px; }
  .summary-value { font-size: 14px; font-weight: 500; }
  .summary-actions { display: flex; gap: 10px; margin-top: 4px; }
  .summary-btn-main {
    flex: 1; background: var(--send-active); color: #fff;
    border: none; border-radius: 10px; font-family: inherit;
    font-size: 14px; font-weight: 600; padding: 12px 0; cursor: pointer;
    transition: opacity .2s;
  }
  .summary-btn-main:hover { opacity: .9; }
  .summary-btn-back {
    background: var(--card); color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px;
    font-family: inherit; font-size: 13px; padding: 12px 16px; cursor: pointer;
    transition: background .15s;
  }
  .summary-btn-back:hover { background: var(--card-hover); }

  /* ── CRISIS BANNER ── */
  .crisis-banner {
    background: var(--crisis-bg);
    border: 1px solid #5a2020; border-left: 3px solid #c0392b;
    border-radius: var(--radius); padding: 16px 18px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .crisis-banner h3 { color: #e07a7a; font-size: 14px; }
  .crisis-banner p  { font-size: 13px; color: #c8a0a0; line-height: 1.6; }
  .crisis-links { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .crisis-link {
    background: #3a1515; border: 1px solid #6a2020;
    border-radius: 8px; padding: 10px 14px;
    display: flex; align-items: center; gap: 10px;
    color: #e07a7a; font-size: 13px; font-weight: 500;
    text-decoration: none; transition: background .15s;
  }
  .crisis-link:hover { background: #4a1818; }

  /* ── INPUT BAR (free text) ── */
  #input-bar {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-end;
    position: sticky; bottom: 0; background: var(--bg);
  }
  #free-input {
    flex: 1; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-family: inherit; font-size: 14px;
    padding: 11px 16px; outline: none; resize: none;
    min-height: 44px; max-height: 140px; line-height: 1.55;
    transition: border-color .2s;
    overflow-y: auto;
  }
  #free-input:focus { border-color: var(--accent); }
  #free-input::placeholder { color: var(--dim); }
  #free-send {
    width: 44px; height: 44px; flex-shrink: 0;
    background: var(--accent-soft); border: none; border-radius: 12px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .15s, opacity .2s;
    font-size: 18px;
  }
  #free-send:hover { background: var(--selected); }
  #free-send:disabled { opacity: .4; cursor: not-allowed; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 500px) {
    .opts-grid { grid-template-columns: 1fr; }
    .bubble { max-width: 95%; }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="header-icon">🕊️</div>
    <div class="header-info">
      <h1>마음 상담</h1>
      <p>이단·사이비 피해 지원</p>
    </div>
    <button class="crisis-btn" onclick="showCrisis()">🚨 위기 시 연락처</button>
  </header>

  <div id="chat"></div>

  <div id="input-bar" style="display:none;">
    <textarea id="free-input" rows="1" placeholder="자유롭게 이야기해 주세요…" 
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button id="free-send" onclick="sendFreeText()" disabled>➤</button>
  </div>

</div>

<script>
// ── STATE ──
const state = {
  step: 0, // 0=intro,1=type,2=group,3=issue,4=summary,5=chat
  clientType: '', group: '', issue: '',
  groupOther: '', issueOther: '',
  messages: [], // {role,content}
  awaitingAPI: false,
};

const SYSTEM_PROMPT = `[ROLE]
당신은 30년 경력의 이단·사이비 피해 전문 상담사입니다.
CBT(인지행동치료)와 ACT(수용전념치료)를 기반으로, 피해자의 주체적 자아를 회복시키는 것이 목표입니다.

[TONE]
- 따뜻한 해요체 사용
- 판단·비난·교리 반박 금지
- 소크라테스식 질문으로 내담자 스스로 깨닫도록 유도

[RESPONSE STRUCTURE - 반드시 준수]
모든 답변은 아래 3단계 구조를 따르세요:

① [공감 - Validation] (2~3문장)
   내담자의 고통과 용기를 무조건적으로 수용합니다.

② [심리 기제 해체 - Deconstruction] (핵심 2~3가지)
   고통의 원인을 심리학적 관점에서 설명합니다.
   - 폐쇄적 내부 용어 → 심리학·사회학 용어로 치환
   - 예: "배도의 두려움" → "공포 기반 통제(Fear-Based Control) 반응"

③ [소크라테스식 전환 질문 - Pivot] (질문 1개)
   내담자가 스스로 깨달을 수 있도록 열린 질문 1개를 제시합니다.
   질문은 짧고 구체적이어야 합니다.

[CRISIS PROTOCOL - 최우선]
신체 감금·폭행·자해·자살 언급 시 즉시:
"지금 말씀해 주신 상황은 즉각적인 안전 확보가 필요합니다."
- 경찰청 112
- 정신건강상담전화 109

[GROUP-SPECIFIC KEYWORDS]
- 신천지: 복음방, 센터, 비유풀이, 이만희, 육체영생
- 하나님의교회: 어머니하나님, 장길자, 안상홍, 유월절
- JMS: 30론, 선생님, 영적사랑, 정명석
- 통일교: 참부모, 합동결혼식, 원리강론, 청평
- 구원파: 깨달음, 구원의확신, 수양회, 기쁜소식

[FORBIDDEN ACTIONS]
✗ 교리 직접 반박
✗ 내담자 선택 비난·평가
✗ 집단 직접 공격
✗ 감정 빠르게 단정

[심리학 용어 치환]
배도의 두려움 → 공포 기반 통제
영적 방해 → 외부 정보 차단 훈련
믿음이 약한 증거 → 충성심 검증 압박
세상 사람 → 이분법적 세계관
헌신 → 매몰비용 오류
구원의 확신 → 인지적 의존성`;

// ── RENDER HELPERS ──
const chat = document.getElementById('chat');

function scrollBottom() {
  setTimeout(() => chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' }), 60);
}

function appendMsg(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="bubble">${content}</div>
    <div class="msg-label">${role === 'user' ? '나' : '상담사'}</div>`;
  chat.appendChild(div);
  scrollBottom();
  return div;
}

function appendWidget(html) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div style="width:100%">${html}</div>`;
  chat.appendChild(div);
  scrollBottom();
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = `<div class="typing-dot"><span></span><span></span><span></span></div>`;
  chat.appendChild(div);
  scrollBottom();
}
function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

// ── INTRO ──
function renderIntro() {
  appendWidget(`
    <div class="intro-card">
      <div class="intro-icon">🕊️</div>
      <div class="intro-title">안전한 상담 공간에 오신 것을 환영해요</div>
      <div class="intro-desc">
        이곳은 판단 없이 당신의 이야기를 듣는 공간이에요.<br>
        아래 단계를 클릭으로 선택하시면 맞춤형 상담이 시작돼요.
      </div>
      <div class="intro-badge">🔒 비밀이 보장되는 공간이에요</div>
      <button class="intro-btn" onclick="startStep1()">상담 시작하기 →</button>
    </div>
  `);
}

// ── STEP 1 ──
function startStep1() {
  appendWidget(`
    <div class="step-widget" id="step1">
      <div class="step-header">
        <div class="step-eyebrow">STEP 1 / 3</div>
        <div class="step-title">지금 어떤 상황에 계신가요?</div>
      </div>
      <div class="step-opts" id="step1-opts">
        ${stepOpt('s1','🚪','이미 나왔어요','단체를 떠난 후 어려움을 겪고 있어요')}
        ${stepOpt('s1','🏛️','아직 다니고 있어요','현재 단체 생활을 하며 고민 중이에요')}

function renderChoiceWidget(botReply) {
  // pick a choice set based on current issue
  let cs = DEFAULT_CHOICE;
  const issue = state.issue;
  if (issue.includes('공포') || issue.includes('불안')) cs = CHOICE_SETS['공포'];
  else if (issue.includes('자책') || issue.includes('죄책')) cs = CHOICE_SETS['자책'];
  else if (issue.includes('고립') || issue.includes('외로')) cs = CHOICE_SETS['고립'];
  else if (issue.includes('정체성')) cs = CHOICE_SETS['정체성'];
  else if (issue.includes('가족')) cs = CHOICE_SETS['가족'];

  const widgetId = 'cw_' + Date.now();
  const optsHtml = cs.opts.map((o, i) => {
    const isOther = o[0] === '✏️';
    return `
      <button class="opt${isOther ? ' opt-full' : ''}" 
        onclick="pickOpt('${widgetId}', this, ${JSON.stringify(o[1])}, ${isOther})">
        <span class="opt-icon">${o[0]}</span>
        <div>
          <div class="opt-main">${o[1]}</div>
          <div class="opt-sub">${o[2]}</div>
        </div>
      </button>`;
  }).join('');

  appendWidget(`
    <div class="choice-widget" id="${widgetId}">

          placeholder="위 항목에 없는 내용을 자유롭게 써주세요" rows="3"
          oninput="checkOtherText('${widgetId}')"></textarea>
      </div>
      <button class="send-btn disabled" id="${widgetId}_send"
        onclick="sendChoice('${widgetId}', '${escapeHtml(cs.label)}')">
        이 생각으로 계속하기 →
      </button>
    </div>
  `);
}

function pickOpt(wid, el, val, isOther) {
  document.querySelectorAll(`#${wid} .opt`).forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  const otherBox = document.getElementById(wid + '_other');
  const sendBtn  = document.getElementById(wid + '_send');
  sendBtn.dataset.val = val;
  if (isOther) {
    otherBox.classList.add('visible');
    const txt = document.getElementById(wid + '_otherText').value.trim();
    if (txt) {
      sendBtn.classList.replace('disabled','active');
    } else {
      sendBtn.classList.replace('active','disabled');
    }
  } else {
    otherBox.classList.remove('visible');
    sendBtn.classList.replace('disabled','active');
  }
}

function checkOtherText(wid) {
  const txt = document.getElementById(wid + '_otherText').value.trim();
  const btn = document.getElementById(wid + '_send');
  if (txt) {
    btn.dataset.val = txt;
    btn.classList.replace('disabled','active');
  } else {
    btn.classList.replace('active','disabled');
  }
}

async function sendChoice(wid, label) {
  const btn = document.getElementById(wid + '_send');
  if (!btn.classList.contains('active')) return;
  const otherBox = document.getElementById(wid + '_other');
  let val = btn.dataset.val;
  if (otherBox.classList.contains('visible')) {
    val = document.getElementById(wid + '_otherText').value.trim() || val;
  }
  // disable widget
  document.querySelectorAll(`#${wid} button`).forEach(b => b.disabled = true);
  const fullMsg = `${label}: ${val}`;
  appendMsg('user', fullMsg);
  state.messages.push({ role: 'user', content: fullMsg });
  await doAPIRound();
}

  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();

async function sendFreeText() {
  const input = document.getElementById('free-input');
  const text = input.value.trim();
  if (!text || state.awaitingAPI) return;
  input.value = ''; autoResize(input);
  appendMsg('user', escapeHtml(text));
  state.messages.push({ role: 'user', content: text });
  await doAPIRound();
}

document.getElementById('free-input').addEventListener('input', function() {

});

async function doAPIRound() {
  if (state.awaitingAPI) return;
  state.awaitingAPI = true;

    hideTyping();
    appendMsg('bot', escapeHtml(reply));

    hideTyping();
    appendMsg('bot', '잠시 연결이 끊겼어요. 조금 뒤 다시 말씀해 주세요.');

}

        onmouseover="this.style.opacity='.9'" onmouseout="this.style.opacity='1'"

          const k = document.getElementById('apikey-input').value.trim();
          if (!k.startsWith('sk-')) {
            document.getElementById('apikey-error').style.display='block'; return;
          }
          setApiKey(k);
          document.getElementById('apikey-overlay').remove();
          onSuccessCallback();
        ">
        상담 시작하기 →
      </button>
      <div id="apikey-error" style="display:none;color:#e07a7a;font-size:12px;text-align:center;">
        올바른 API 키 형식이 아니에요. (sk- 로 시작해야 해요)
      </div>
    </div>
  `;
  // store callback globally to avoid inline scope issue
  window.onSuccessCallback = onSuccess;
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('apikey-input').focus(), 100);
}

async function callClaude(messages) {
  let apiKey = getApiKey();
  if (!apiKey) {
    return new Promise((resolve, reject) => {
      showApiKeyModal(async () => {
        try {
          const result = await callClaude(messages);
          resolve(result);
        } catch(e) { reject(e); }
      });
    });
  }

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: messages,
    })
  });
  if (response.status === 401) {
    sessionStorage.removeItem('anthropic_key');
    throw new Error('API 키가 올바르지 않아요. 새로고침 후 다시 입력해 주세요.');
  }
  if (!response.ok) throw new Error('API error ' + response.status);
  const data = await response.json();
  return data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}
